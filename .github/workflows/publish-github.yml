# =============================================================================
# Publish - Zeayii.Flow (GitHub Release)
#
# Repository: zeayii/flow
#
# 目标：
#   - 手动输入单一版本号（严格 X.Y.Z）
#   - 三平台构建 NativeAOT 单文件产物
#   - 自动打 Tag 并创建 GitHub Release
#   - 当前只发 GitHub Release，不发 NuGet
# =============================================================================

name: publish-flow

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (strict X.Y.Z, e.g. 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-flow
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate version format
        shell: bash
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version '${{ inputs.version }}'. Expected strict X.Y.Z format."
            exit 1
          fi

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore Zeayii.Flow.sln /p:Version=${{ inputs.version }}

      - name: Build solution
        run: dotnet build Zeayii.Flow.sln -c Release --no-restore /p:Version=${{ inputs.version }}

      - name: Test solution
        run: dotnet test Zeayii.Flow.sln -c Release --no-build

  publish-aot:
    name: Publish - ${{ matrix.os }} / ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    needs: verify
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: zeayii-flow-linux-x64
            executable_name: flow
          - os: windows-latest
            rid: win-x64
            artifact_name: zeayii-flow-win-x64
            executable_name: flow.exe
          - os: macos-latest
            rid: osx-x64
            artifact_name: zeayii-flow-osx-x64
            executable_name: flow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish NativeAOT executable
        run: |
          dotnet publish Zeayii.Flow.CommandLine/Zeayii.Flow.CommandLine.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            -p:Version=${{ inputs.version }} \
            -p:PublishAot=true \
            -p:PublishSingleFile=true \
            -p:SelfContained=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -o artifacts/${{ matrix.artifact_name }}

      - name: Prepare executable artifact
        run: |
          mkdir -p package/${{ matrix.artifact_name }}
          cp artifacts/${{ matrix.artifact_name }}/${{ matrix.executable_name }} package/${{ matrix.artifact_name }}/

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: package/${{ matrix.artifact_name }}/${{ matrix.executable_name }}
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: publish-aot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-files
          cp release-artifacts/zeayii-flow-win-x64/flow.exe release-files/flow-win-x64.exe
          cp release-artifacts/zeayii-flow-linux-x64/flow release-files/flow-linux-x64
          cp release-artifacts/zeayii-flow-osx-x64/flow release-files/flow-osx-x64
          chmod +x release-files/flow-linux-x64
          chmod +x release-files/flow-osx-x64

      - name: Create Git tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ inputs.version }} already exists. Skip creating tag."
          else
            git tag v${{ inputs.version }}
            git push origin v${{ inputs.version }}
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          generate_release_notes: true
          files: |
            release-files/flow-win-x64.exe
            release-files/flow-linux-x64
            release-files/flow-osx-x64
