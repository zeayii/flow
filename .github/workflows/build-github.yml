# =============================================================================
# Build - Zeayii.Flow (GitHub, NativeAOT)
#
# 目标：
#   - 在 Windows / Linux / macOS 三平台构建 NativeAOT 单文件产物
#   - 运行 build + test，保证公开仓库的基础门禁
#   - 上传每个平台的可执行文件供验收
# =============================================================================

name: build-flow

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-flow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore Zeayii.Flow.sln

      - name: Build solution
        run: dotnet build Zeayii.Flow.sln -c Release --no-restore

      - name: Test solution
        run: dotnet test Zeayii.Flow.sln -c Release --no-build

  publish-aot:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    name: Publish - ${{ matrix.os }} / ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    needs: verify
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: zeayii-flow-linux-x64
            executable_name: flow
          - os: windows-latest
            rid: win-x64
            artifact_name: zeayii-flow-win-x64
            executable_name: flow.exe
          - os: macos-latest
            rid: osx-x64
            artifact_name: zeayii-flow-osx-x64
            executable_name: flow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish NativeAOT executable
        run: |
          dotnet publish Zeayii.Flow.CommandLine/Zeayii.Flow.CommandLine.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            -p:PublishAot=true \
            -p:PublishSingleFile=true \
            -p:SelfContained=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -o artifacts/${{ matrix.artifact_name }}

      - name: Prepare executable artifact
        run: |
          mkdir -p package/${{ matrix.artifact_name }}
          cp artifacts/${{ matrix.artifact_name }}/${{ matrix.executable_name }} package/${{ matrix.artifact_name }}/

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: package/${{ matrix.artifact_name }}/${{ matrix.executable_name }}
          if-no-files-found: error
